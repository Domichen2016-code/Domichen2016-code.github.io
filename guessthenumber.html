<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="Favicon.png">
    <title>Guess the Number</title>
    <style>
        :root{
            --bg1: #a8edea;
            --bg2: #fed6e3;
            --card: rgba(255,255,255,0.85);
            --accent: #0ea5a4;
            --muted: #475569;
        }

        *{box-sizing: border-box;}
        body{
            margin:0;
            min-height:100vh;
            font-family: Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial;
            background: linear-gradient(135deg,var(--bg1), var(--bg2));
            display:flex;
            align-items:center;
            justify-content:center;
            padding:2rem;
            color: #0f172a;
        }

        .container{
            width: min(920px, 96vw);
            background: var(--card);
            border-radius: 14px;
            padding: 1.25rem 1.5rem;
            box-shadow: 0 12px 40px rgba(2,6,23,0.08);
            text-align: center;
        }

        h1{
            font-size: clamp(1.4rem, 3.6vw, 2rem);
            margin-bottom: 0.5rem;
        }

        .lead{
            font-size: clamp(1rem, 2.4vw, 1.25rem);
            margin-bottom: 1rem;
            color: var(--muted);
        }

        /* input centered and responsive */
        #number{
            width: min(320px, 28vw);
            max-width: 100%;
            padding: 0.6rem 0.75rem;
            font-size: clamp(1rem, 2.8vw, 1.5rem);
            border-radius: 8px;
            border: 2px solid rgba(15,23,42,0.08);
            outline: none;
            text-align: center;
            margin: 0.6rem 0;
        }

        #hint{
            min-height: 3.5rem;
            margin-top: 0.75rem;
            font-size: clamp(1rem, 2.4vw, 1.25rem);
            color: var(--muted);
        }

        audio{
            position: fixed;
            bottom: 12px;
            right: 12px;
            background: transparent;
            z-index: 80;
            border-radius: 8px;
        }

        /* small-screen tweaks */
        @media (max-width: 520px){
            .container{ padding: 1rem; }
            #number{ width: 72vw; }
        }
    </style>
</head>
<body bgcolor="Aqua">
    <div class="container">
        <h1> Welcome to Guess the Number.</h1>
        <div class="lead">I am thinking of a number 1-1000</div>
        <input type="number" id="number" onclick="pressearly()">
        <div id="hint" onclick="rghl()"></div>
    </div>
    <audio controls>
        <source src="Relaxing_Music.mp3" type="audio/mpeg">
    </audio>
    <script>
        var result;
        var tries = 0
        document.getElementById("number").disabled = false;
        function checknumber() {
            // getUserInput vs result
           
            if (document.getElementById("number").value > result ) {
             document.getElementById("hint").innerHTML = "Go Lower"    
            } else if((document.getElementById("number").value < result )) {
                document.getElementById("hint").innerHTML = "Go Higher"
            } else{
                document.getElementById("hint").innerHTML = "You got it in " + tries + " tries! Click here to play again.";
            }
        }
        function rghl() {
           location.reload();
        }
        function generatenumber() {            
            result = Math.floor(Math. random() * (1000 - 1) + 1)
        }
        generatenumber()
        document.addEventListener('keyup', function(event){     
            console.log(event.key);
            if (event.key == "Enter") {
                tries++
                checknumber()
            } 


            
        }); 
        function pressearly() {
            console.log("pressed early");
            
        }
    </script>
</body>
</html>
